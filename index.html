<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浙江明丰实业 · AI赋能升级方案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: #F5F6F8; color: #1F2937; line-height: 1.7; overflow-x: hidden; }
  ::selection { background: rgba(30,77,180,0.15); }
  .font-serif { font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif; }

  /* NAV */
  .nav-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,0,0,0.06); transition: box-shadow 0.3s; }
  .nav-bar.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px 0 16px; height: 64px; }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 18px; width: auto; }
  .nav-logo span { font-size: 15px; color: #374151; font-weight: 500; }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a { font-size: 13px; color: #6B7280; text-decoration: none; transition: color 0.2s; font-weight: 400; white-space: nowrap; }
  .nav-links a:hover { color: #1E4DB4; }

  /* SECTION COMMON */
  .section { max-width: 1200px; margin: 0 auto; padding: 100px 40px; }
  .section-label { font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #1E4DB4; margin-bottom: 16px; }
  .section-title { font-family: 'Noto Serif SC', serif; font-size: 36px; font-weight: 700; color: #111827; line-height: 1.35; margin-bottom: 20px; }
  .section-subtitle { font-size: 17px; color: #6B7280; line-height: 1.8; max-width: 680px; }

  /* HERO */
  .hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(165deg, #0F1B3D 0%, #1E3A5F 40%, #1E4DB4 100%); overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 20%, rgba(42,157,143,0.15) 0%, transparent 60%), radial-gradient(ellipse at 30% 80%, rgba(212,168,83,0.08) 0%, transparent 50%); }
  .hero-grid { position: absolute; inset: 0; opacity: 0.04; background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px); background-size: 80px 80px; }
  .hero-content { position: relative; z-index: 1; text-align: center; max-width: 860px; padding: 40px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 8px 20px; margin-bottom: 40px; }
  .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #2A9D8F; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.5); } }
  .hero-badge span { font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 0.05em; }
  .hero h1 { font-family: 'Noto Serif SC', serif; font-size: 56px; font-weight: 900; color: #fff; line-height: 1.25; margin-bottom: 24px; }
  .hero h1 em { font-style: normal; background: linear-gradient(135deg, #2A9D8F, #3DD6C0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-desc { font-size: 19px; color: rgba(255,255,255,0.65); line-height: 1.8; max-width: 620px; margin: 0 auto 48px; }
  .hero-stats { display: flex; justify-content: center; gap: 64px; padding-top: 48px; border-top: 1px solid rgba(255,255,255,0.08); }
  .hero-stat { text-align: center; }
  .hero-stat-value { font-family: 'Noto Serif SC', serif; font-size: 40px; font-weight: 700; color: #fff; line-height: 1.2; }
  .hero-stat-value span { font-size: 20px; color: rgba(255,255,255,0.5); }
  .hero-stat-label { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; }

  /* CONTEXT */
  .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-top: 56px; }
  .context-card { background: #fff; border-radius: 12px; padding: 40px; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; }
  .context-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
  .context-card-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .context-card h3 { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 12px; }
  .context-card p { font-size: 15px; color: #6B7280; line-height: 1.75; }

  /* CHALLENGE */
  .challenge-section { background: #0F1B3D; color: #fff; }
  .challenge-section .section-label { color: #2A9D8F; }
  .challenge-section .section-title { color: #fff; }
  .challenge-section .section-subtitle { color: rgba(255,255,255,0.5); }
  .challenge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
  .challenge-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 36px; transition: background 0.3s; }
  .challenge-card:hover { background: rgba(255,255,255,0.07); }
  .challenge-num { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }
  .challenge-card h3 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 12px; }
  .challenge-card p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.75; }

  /* DIRECTION OVERVIEW (6 cards as TOC) */
  .dir-overview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }
  .dir-overview-card { background: #fff; border-radius: 12px; padding: 32px; border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: block; }
  .dir-overview-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
  .dir-overview-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .dir-overview-card:nth-child(1)::before { background: #1E4DB4; }
  .dir-overview-card:nth-child(2)::before { background: #2A9D8F; }
  .dir-overview-card:nth-child(3)::before { background: #7C3AED; }
  .dir-overview-card:nth-child(4)::before { background: #D4A853; }
  .dir-overview-card:nth-child(5)::before { background: #DC2626; }
  .dir-overview-card:nth-child(6)::before { background: #2563EB; }
  .dir-ov-num { font-size: 12px; font-weight: 700; color: #9CA3AF; letter-spacing: 0.05em; margin-bottom: 12px; }
  .dir-ov-title { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .dir-ov-sub { font-size: 13px; color: #6B7280; line-height: 1.6; }

  /* DIRECTION DETAIL (full-width sections) */
  .dir-detail { padding: 100px 0; }
  .dir-detail:nth-child(odd) { background: #fff; }
  .dir-detail:nth-child(even) { background: #F9FAFB; }
  .dir-detail-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .dir-detail-header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 48px; }
  .dir-detail-num { font-family: 'Noto Serif SC', serif; font-size: 64px; font-weight: 900; line-height: 1; flex-shrink: 0; }
  .dir-detail-header-text { flex: 1; }
  .dir-detail-label { font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .dir-detail-title { font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 700; color: #111827; margin-bottom: 8px; }
  .dir-detail-subtitle { font-size: 16px; color: #6B7280; line-height: 1.7; }
  .dir-detail-body { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
  .dir-detail-body > * { min-width: 0; overflow-wrap: break-word; word-break: break-word; }
  .dir-detail-block { margin-bottom: 32px; }
  .dir-detail-block:last-child { margin-bottom: 0; }
  .dir-block-title { font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .dir-block-title::before { content: ''; width: 3px; height: 16px; border-radius: 2px; }
  .dir-detail-block ul { list-style: none; }
  .dir-detail-block li { font-size: 14px; color: #6B7280; line-height: 1.8; padding-left: 20px; position: relative; margin-bottom: 8px; overflow-wrap: break-word; word-break: break-word; }
  .dir-detail-block li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; }
  .dir-detail-block p { font-size: 14px; color: #6B7280; line-height: 1.8; overflow-wrap: break-word; word-break: break-word; }
  .dir-metric-row { display: flex; gap: 24px; margin-top: 16px; }
  .dir-metric { flex: 1; background: #F9FAFB; border-radius: 10px; padding: 20px; text-align: center; }
  .dir-metric:nth-child(odd) { background: rgba(30,77,180,0.04); }
  .dir-metric:nth-child(even) { background: rgba(42,157,143,0.04); }
  .dir-metric-value { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; white-space: nowrap; }
  .dir-metric:nth-child(odd) .dir-metric-value { color: #1E4DB4; }
  .dir-metric:nth-child(even) .dir-metric-value { color: #2A9D8F; }
  .dir-metric-label { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
  .dir-tool-tag { display: inline-block; font-size: 12px; padding: 4px 12px; border-radius: 100px; background: #F3F4F6; color: #4B5563; font-weight: 500; margin: 3px 4px 3px 0; }
  .dir-significance { background: linear-gradient(135deg, rgba(30,77,180,0.04), rgba(42,157,143,0.04)); border-radius: 12px; padding: 28px; border-left: 3px solid #1E4DB4; margin-top: 32px; }
  .dir-significance-label { font-size: 12px; font-weight: 600; color: #1E4DB4; letter-spacing: 0.1em; margin-bottom: 10px; }
  .dir-significance p { font-size: 15px; color: #374151; line-height: 1.8; }

  /* Case showcase (AI画图) */
  .dir-cases { margin-top: 40px; }
  .dir-cases-title { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .dir-cases-title::before { content: ''; width: 3px; height: 18px; background: #2A9D8F; border-radius: 2px; }
  .dir-case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .dir-case-img { border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); background: #fff; }
  .dir-case-img img { width: 100%; height: auto; display: block; }
  .dir-case-img-caption { padding: 12px 16px; font-size: 13px; color: #6B7280; line-height: 1.6; }
  .dir-case-img-caption strong { color: #374151; }
  .dir-tutorials { display: flex; flex-wrap: wrap; gap: 12px; }
  .dir-tutorial-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 8px;
    background: #F9FAFB; border: 1px solid rgba(0,0,0,0.06);
    font-size: 13px; color: #1E4DB4; text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    overflow-wrap: break-word; word-break: break-word;
  }
  .dir-tutorial-link:hover { background: #EFF6FF; border-color: rgba(30,77,180,0.2); }
  .dir-tutorial-link svg { flex-shrink: 0; }

  /* Writing cases - split layout */
  .dir-writing-cases { margin-top: 40px; display: flex; gap: 24px; height: 560px; }
  .dir-writing-text {
    flex: 1; min-width: 0;
    background: #F9FAFB; border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
  }
  .dir-writing-text-header {
    padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.06);
    font-size: 15px; font-weight: 600; color: #111827;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .dir-writing-text-header::before { content: ''; width: 3px; height: 16px; background: #1E4DB4; border-radius: 2px; }
  .dir-writing-tabs { display: flex; gap: 4px; padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; overflow-x: auto; }
  .dir-writing-tab {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    color: #6B7280; background: transparent; border: 1px solid transparent;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .dir-writing-tab:hover { color: #374151; background: #F3F4F6; }
  .dir-writing-tab.active { color: #1E4DB4; background: #EFF6FF; border-color: rgba(30,77,180,0.2); }
  .dir-writing-content {
    flex: 1; overflow-y: auto; padding: 20px;
    font-size: 13px; color: #374151; line-height: 1.8;
  }
  .dir-writing-content pre {
    background: #1E293B; color: #E2E8F0; padding: 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.6; overflow-x: auto; margin: 12px 0;
    white-space: pre-wrap; word-break: break-word;
  }
  /* Multilingual Catalog Case */
  .ml-catalog-case { margin-top: 40px; background: #F9FAFB; border: 1px solid rgba(0,0,0,0.06); border-radius: 12px; overflow: hidden; }
  .ml-catalog-header { padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .ml-catalog-header h4 { font-size: 16px; font-weight: 600; color: #111827; margin: 0 0 6px; }
  .ml-catalog-header p { font-size: 13px; color: #6B7280; margin: 0; line-height: 1.6; }
  .ml-catalog-tabs { display: flex; gap: 4px; padding: 12px 24px; border-bottom: 1px solid rgba(0,0,0,0.06); overflow-x: auto; }
  .ml-catalog-tab {
    padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    color: #6B7280; background: transparent; border: 1px solid transparent;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .ml-catalog-tab:hover { color: #374151; background: #F3F4F6; }
  .ml-catalog-tab.active { color: #2A9D8F; background: rgba(42,157,143,0.08); border-color: rgba(42,157,143,0.2); }
  .ml-catalog-body { padding: 16px 24px; max-height: 320px; overflow-y: auto; font-size: 13px; color: #374151; line-height: 1.8; }
  .ml-catalog-body h5 { font-size: 14px; font-weight: 600; color: #111827; margin: 12px 0 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .ml-catalog-body h5:first-child { margin-top: 0; }
  .ml-catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ml-catalog-product { background: #fff; border: 1px solid rgba(0,0,0,0.04); border-radius: 8px; padding: 12px 14px; }
  .ml-catalog-product-name { font-weight: 600; color: #111827; font-size: 13px; margin-bottom: 3px; }
  .ml-catalog-product-meta { font-size: 11px; color: #9CA3AF; margin-bottom: 4px; }
  .ml-catalog-product-desc { font-size: 12px; color: #6B7280; line-height: 1.5; }
  .ml-catalog-stats { display: flex; gap: 16px; padding: 10px 24px; background: rgba(42,157,143,0.04); border-top: 1px solid rgba(0,0,0,0.04); flex-wrap: wrap; }
  .ml-catalog-stat { font-size: 12px; color: #6B7280; }
  .ml-catalog-stat strong { color: #2A9D8F; font-weight: 600; }
  .ml-catalog-download { display: flex; justify-content: center; padding: 14px 24px; border-top: 1px solid rgba(0,0,0,0.06); }
  .ml-catalog-download a { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: #2A9D8F; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 500; text-decoration: none; transition: background 0.2s; }
  .ml-catalog-download a:hover { background: '#238B7E'; }
  .dir-writing-content h4 { font-size: 14px; font-weight: 600; color: #111827; margin: 16px 0 8px; }
  .dir-writing-content h4:first-child { margin-top: 0; }
  .dir-writing-carousel {
    width: 420px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .dir-carousel-main {
    flex: 1; min-height: 0; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(0,0,0,0.06); background: #fff;
    position: relative;
  }
  .dir-carousel-main img { width: 100%; height: 100%; object-fit: contain; background: #f9fafb; }
  .dir-carousel-nav { display: flex; gap: 8px; justify-content: center; }
  .dir-carousel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #D1D5DB; border: none; cursor: pointer; transition: all 0.2s;
  }
  .dir-carousel-dot.active { background: #1E4DB4; width: 24px; border-radius: 4px; }
  .dir-carousel-label {
    text-align: center; font-size: 12px; color: #9CA3AF; margin-top: 4px;
  }
  @media (max-width: 900px) {
    .dir-writing-cases { flex-direction: column; min-height: auto; }
    .dir-writing-carousel { width: 100%; }
    .dir-writing-content { max-height: 400px; }
  }
  @media (max-width: 900px) { .dir-case-grid { grid-template-columns: 1fr; } }

  /* Workflow steps */
  .dir-workflow-steps { display: flex; gap: 16px; align-items: flex-start; }
  .dir-workflow-step { flex: 1; text-align: center; position: relative; }
  .dir-workflow-step-label {
    display: inline-block; font-size: 11px; font-weight: 700; color: #fff;
    background: #2A9D8F; padding: 3px 12px; border-radius: 100px;
    margin-bottom: 12px; letter-spacing: 0.05em;
  }
  .dir-workflow-step-img {
    border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06);
    background: #fff; margin-bottom: 10px;
  }
  .dir-workflow-step-img img { width: 100%; height: auto; display: block; }
  .dir-workflow-step-caption { font-size: 12px; color: #6B7280; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; }
  .dir-workflow-arrow {
    position: absolute; right: -14px; top: 50%; transform: translateY(-50%);
    font-size: 20px; color: #2A9D8F; font-weight: 700; z-index: 1;
  }
  .dir-workflow-step:last-child .dir-workflow-arrow { display: none; }
  @media (max-width: 900px) {
    .dir-workflow-steps { flex-direction: column; align-items: center; }
    .dir-workflow-arrow { display: none !important; }
    .dir-workflow-step { max-width: 320px; }
  }

  /* Color accents per direction */
  .dir-color-1 .dir-detail-num { color: #1E4DB4; }
  .dir-color-1 .dir-detail-label { color: #1E4DB4; }
  .dir-color-1 .dir-block-title::before { background: #1E4DB4; }
  .dir-color-1 .dir-detail-block li::before { background: #1E4DB4; }
  .dir-color-2 .dir-detail-num { color: #2A9D8F; }
  .dir-color-2 .dir-detail-label { color: #2A9D8F; }
  .dir-color-2 .dir-block-title::before { background: #2A9D8F; }
  .dir-color-2 .dir-detail-block li::before { background: #2A9D8F; }
  .dir-color-3 .dir-detail-num { color: #7C3AED; }
  .dir-color-3 .dir-detail-label { color: #7C3AED; }
  .dir-color-3 .dir-block-title::before { background: #7C3AED; }
  .dir-color-3 .dir-detail-block li::before { background: #7C3AED; }
  .dir-color-4 .dir-detail-num { color: #D4A853; }
  .dir-color-4 .dir-detail-label { color: #D4A853; }
  .dir-color-4 .dir-block-title::before { background: #D4A853; }
  .dir-color-4 .dir-detail-block li::before { background: #D4A853; }
  .dir-color-5 .dir-detail-num { color: #DC2626; }
  .dir-color-5 .dir-detail-label { color: #DC2626; }
  .dir-color-5 .dir-block-title::before { background: #DC2626; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); } }, { threshold: 0.1 });
    obs.observe(el); return () => obs.disconnect();
  }, []);
  return ref;
}
function FadeIn({ children, delay = '', className = '' }) {
  const ref = useFadeIn();
  return <div ref={ref} className={`fade-in ${delay ? 'fade-in-delay-' + delay : ''} ${className}`}>{children}</div>;
}

/* NAV */
function NavBar() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => { const h = () => setScrolled(window.scrollY > 20); window.addEventListener('scroll', h, { passive: true }); return () => window.removeEventListener('scroll', h); }, []);
  return (
    <nav className={`nav-bar ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-inner">
        <a href="#hero" className="nav-logo">
          <img src="manful-logo.png" alt="Manful 明豐" />
          <span style={{color: '#9CA3AF', fontSize: 13}}>AI赋能升级方案</span>
        </a>
        <div className="nav-links">
          <a href="#context">企业洞察</a>
          <a href="#challenge">核心挑战</a>
          <a href="#strategy">战略框架</a>
          <a href="#directions">六大方向</a>
          <a href="#deep-scenarios">实战场景</a>
          <a href="#roadmap">实施路径</a>
          <a href="#scenarios">未来推演</a>
        </div>
      </div>
    </nav>
  );
}

/* HERO */
function Hero() {
  return (
    <section className="hero" id="hero">
      <div className="hero-grid"></div>
      <div className="hero-content">
        <div className="hero-badge"><div className="hero-badge-dot"></div><span>2026年4月 · 内部战略研讨</span></div>
        <h1 className="font-serif">从「车罩大王」到<em>AI赋能</em>的<br />品牌跃迁之路</h1>
        <p className="hero-desc">三十年制造积淀，全球最大车罩工厂。如今站在品牌化转型的十字路口，大模型AI如何帮助明丰跨越「从强到名」的鸿沟？</p>
        <div className="hero-stats">
          <div className="hero-stat"><div className="hero-stat-value">30<span>年</span></div><div className="hero-stat-label">深耕汽车用品</div></div>
          <div className="hero-stat"><div className="hero-stat-value">5<span>亿+</span></div><div className="hero-stat-label">年销售额</div></div>
          <div className="hero-stat"><div className="hero-stat-value">70<span>+国</span></div><div className="hero-stat-label">产品覆盖</div></div>
          <div className="hero-stat"><div className="hero-stat-value">153<span>件</span></div><div className="hero-stat-label">专利储备</div></div>
        </div>
      </div>
    </section>
  );
}

/* CONTEXT */
function Context() {
  const cards = [
    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1E4DB4" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>, bg: 'rgba(30,77,180,0.08)', t: '制造端：绝对头部', d: '17万平米厂房、1200台设备、153件专利、日产量1.5万件。国内车罩行业几乎没有对手，行业标准第一起草单位。' },
    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2A9D8F" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>, bg: 'rgba(42,157,143,0.08)', t: '品牌端：认知缺失', d: '「明丰」和「嘿酷」品牌知名度主要限于B端采购商，C端消费者几乎没有认知。从「工厂」到「品牌」，还差一整套能力体系。' },
    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4A853" strokeWidth="2" strokeLinecap="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>, bg: 'rgba(212,168,83,0.08)', t: '数字化：最大短板', d: '官网功能基础，电商布局有限，社交媒体运营几乎空白。在线上获客成为主流的今天，数字化缺失正在成为增长瓶颈。' },
    { icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>, bg: 'rgba(124,58,237,0.08)', t: '机遇：二代接班 + AI窗口', d: '沈茂接班后明确提出「打造车旅用品一流民族品牌」的战略。大模型AI的出现，恰好提供了一个「弯道超车」的历史性窗口。' }

    </section>
  );
}

/* CHALLENGE */
function Challenge() {
  const items = [
    { n: '01', t: '利润挤压', d: '原材料、人工、海运成本持续上涨，但终端采购价逐年下降。利润空间从十年前的15%-20%压缩到5%-8%。' },
    { n: '02', t: '渠道挤压', d: '海外采购商转向线上平台直接采购。线上流量逻辑完全不同于线下展会——要求数字化展示、内容营销和即时沟通能力。' },
    { n: '03', t: '品牌挤压', d: '海外客户越来越要求工厂具备品牌化能力——不仅是「能做出来」，还要「能卖出去」。从产品设计到售后的一整套能力成为门槛。' }

        <div className="challenge-grid">{items.map((c, i) => <FadeIn key={i} delay={String(i+1)}><div className="challenge-card"><div className="challenge-num">{c.n}</div><h3>{c.t}</h3><p>{c.d}</p></div></FadeIn>)}</div>
      </div>

}

/* STRATEGY FRAMEWORK (4.1) */
function StrategyFramework() {
  return (
    <section className="strategy-section" id="strategy">

        <FadeIn>
          <div className="strategy-core">

            <p className="section-subtitle">所有关于「AI赋能」的讨论，如果不回到商业本质，很容易变成一场技术展览。剥开所有概念，明丰做AI赋能的目的只有一个：</p>

        </FadeIn>
        <div className="strategy-paths">
          <FadeIn delay="1">
            <div className="strategy-path">
              <div className="strategy-path-label">路径一</div>
              <h3 className="font-serif">在现有品类里赚更多钱</h3>

            output: '【小红书笔记1：测评体验型】\n标题：房车过冬没保护？这款罩子我后悔没早买 🚐❄️\n\n正文：\n坐标北京，房车停露天整整一个冬天了，之前一直没当回事，觉得"不就是个罩子嘛"。\n\n直到去年三月把罩子掀开——车顶全是鸟粪印，雨刷器被冻在玻璃上掰断了，密封条上全是裂纹。光洗车+换雨刷+修密封条就花了将近两千块。\n\n今年入冬前朋友推荐了嘿酷这款房车罩，Class B的尺寸刚好合适。说一下用了三个月的真实感受：\n\n面料手感很扎实，420D牛津布比之前买的那种薄款厚实太多了。北京冬天风大，最担心的是半夜被刮跑，但它底部有弹力绳+抗风插销系统，装好之后十二级大风纹丝不动。\n\n透气窗这个设计我一开始觉得可有可无，后来发现特别实用。之前用过一款不透气的罩子，春天打开车里面一股霉味。嘿酷这个用了三个月掀开，车里干干爽爽，一点问题没有。\n\n收纳也方便，罩子底部自带收纳袋，一个人五分钟就能叠好收起来。\n\n总结：如果你在北京或者北方城市有房车，冬天一定要罩上。这笔钱比修车便宜太多了。\n\n标签：#房车 #房车罩 #房车生活 #自驾游 #户外装备 #嘿酷 #房车过冬\n\n配图建议：\n1. 房车罩安装前后对比照（雪景）\n2. 罩子细节特写拼图（面料质感、透气窗、抗风绳扣）\n3. 收纳后体积对比（放储物箱里）\n\n━━━━━━━━━━━━━━━━━━\n\n【小红书笔记2：避坑指南型】\n标题：房车罩千万别乱买！踩坑3年总结的血泪教训 😤\n\n正文：\n买房车罩这件事，我前前后后踩了三个大坑，花了快两千块才学明白。\n\n坑一：贪便宜买了PEVA材质的\n第一次在拼多多花89块买了个"四季通用"房车罩，用了不到两个月太阳一晒就开始发脆，风一吹直接裂了一条大口子。\n避坑方法：看面料参数，至少选210D牛津布起步，推荐420D。\n\n坑二：没量尺寸直接按车型买\n尺寸买小了，房车顶部的空调外机把罩子顶出两个大鼓包，一下雨就积水。\n避坑方法：一定要实际测量！从车头保险杠到车尾最远处的直线距离。\n\n坑三：忽略透气性\n600D罩子防风防水好但完全不透气，用了一个月车内密封条全长白毛。\n避坑方法：一定要选带透气窗设计的。\n\n标签：#房车 #房车罩 #避坑指南 #房车装备 #嘿酷\n\n━━━━━━━━━━━━━━━━━━\n\n【小红书笔记3：场景种草型】\n标题：大理房车露营｜有它真的太安心了 🏕️✨\n\n正文：\n三月底带家人开房车去大理，在洱海边找了个营地停了五天。大理的紫外线是真的猛。\n\n白天出去逛古城的时候就把罩子盖上。420D牛津布+银色UV涂层确实管用，下午回来打开车门，车里没有"蒸笼感"。\n\n第三天下午突然下暴雨，风力五六级。等雨停了跑回去一看，罩子稳稳当当的，掀开罩子车身滴水未沾。\n\n晚上在营地遇到一对澳洲来的老夫妻，看到我们的罩子专门过来问是什么牌子。\n\n标签：#房车 #房车露营 #大理旅行 #洱海 #嘿酷 #云南自驾游\n\n━━━━━━━━━━━━━━━━━━\n\n【抖音脚本1：15秒测评型】\n主题：房车罩到底有没有必要买？\n\n镜头1（0-3s）：没盖罩子的房车，落满树叶鸟粪\n字幕："房车停了一个月，洗车花了300块"\n\n镜头2（3-6s）：快速覆盖嘿酷罩子\n字幕："后来我学聪明了"\n\n镜头3（6-10s）：面料/抗风绳扣/透气窗特写\n字幕："420D牛津布，大风也不怕"\n\n镜头4（10-13s）：掀开罩子车身干净\n字幕："打开那一刻，真香"\n\n镜头5（13-15s）：指向镜头\n旁白："房车车主评论区扣1，我告诉你哪里买"\n\n━━━━━━━━━━━━━━━━━━\n\n【抖音脚本2：30秒避坑型】\n主题：买房车罩的3个致命错误\n\n镜头1（0-3s）：拿着裂开的薄款房车罩\n字幕："买房车罩别踩这3个坑"\n\n镜头2（3-8s）：PEVA罩子在阳光下碎裂\n字幕："坑一：贪便宜买PEVA材质"\n旁白："至少选210D牛津布，推荐420D"\n\n镜头3（8-15s）：尺寸不合适的罩子鼓包积水\n字幕："坑二：不量尺寸按车型买"\n\n镜头4（15-22s）：不透气罩子内侧霉斑 vs 嘿酷干燥\n字幕："坑三：忽略透气性"\n\n镜头5（22-27s）：嘿酷完整安装快放\n字幕："面料看D数、尺寸量着买、透气不能省"\n\n镜头6（27-30s）：指向屏幕下方\n旁白："想知道我最后选了哪款？主页有链接"'
